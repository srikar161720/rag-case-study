# ─────────────────────────────────────────────────────────────────────────────
# CI — lint, typecheck, test, secret-scan on every PR + push to main.
#
# Scope: four jobs — backend, frontend, secret-scan, and the advisory
# evaluation-freshness check (added on feat/remaining-tools-and-eval). One
# more job lands on a later branch once its prerequisite files exist:
#   - api-contract (G3, openapi.json ↔ api-types.ts drift) → feat/api-contract
# The real-LLM eval lives in its own workflow (eval.yml). evaluation-freshness
# is advisory (continue-on-error, warnings only) — NOT a required status check.
#
# The frontend job needs no secrets. The backend job needs OPENAI_API_KEY: its
# integration tests boot the full FastAPI app, whose lifespan loads the RAG index
# (chroma_db/ + bm25.pkl) — gitignored build artifacts absent on a fresh checkout —
# so the job builds the index first (one OpenAI embedding call, ~$0.0001). The
# test suite itself is hermetic (tests/conftest.py env shim + tests/_fakes.py
# stubs the Anthropic client); the frontend reads BACKEND_URL/BACKEND_API_KEY only
# at request time, not at build.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      # `uv sync --locked` installs deps AND asserts uv.lock is current — the
      # G12 lockfile-drift guard in one step.
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run mypy src
      # Integration tests boot the full app via lifespan, which loads the RAG
      # index from disk. chroma_db/ + bm25.pkl are gitignored (baked at Docker
      # build), so build them here before pytest. Mirrors eval.yml's approach.
      - name: Build RAG index (integration tests boot the full app)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run python scripts/build_index.py \
            --out-chroma ./chroma_db \
            --out-bm25 ./bm25.pkl \
            --out-manifest ./manifest.json
      - run: uv run pytest tests/unit tests/integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      # Pin pnpm explicitly to match package.json's packageManager (pnpm@11.1.3);
      # omitting it risks a Corepack version mismatch.
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          # Node 22 (matches .tool-versions: nodejs 22.22.3). pnpm 11.x requires
          # Node >= 22.13 (uses the node:sqlite builtin); Node 20 fails with
          # ERR_UNKNOWN_BUILTIN_MODULE.
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      # --frozen-lockfile runs sharp + unrs-resolver install scripts, pre-approved
      # in frontend/pnpm-workspace.yaml (allowBuilds), so it won't trip
      # ERR_PNPM_IGNORED_BUILDS.
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      # No `pnpm test` step: the test script is a no-op until Vitest lands on
      # feat/frontend-tests (Day 6, G2).

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      - uses: gitleaks/gitleaks-action@v2
        env:
          # GITHUB_TOKEN is auto-provided; lets the action comment on PRs.
          # GITLEAKS_LICENSE is only required for organization repos, not this
          # user-account repo, so it's intentionally omitted.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  evaluation-freshness:
    # Advisory only (G5): warns when EVALUATION.md was generated under an older
    # PROMPT_VERSION than the current code, so a stale snapshot doesn't ship.
    # continue-on-error + warning annotations only — never blocks a merge, and
    # is intentionally NOT in branch protection's required checks. The real
    # regeneration is user-invoked (`make eval-md`); this is just the nudge.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Compare PROMPT_VERSION (code vs EVALUATION.md)
        run: |
          CURRENT=$(grep -oP '^PROMPT_VERSION[^=]*=\s*"\K[^"]+' \
            backend/src/customs_agent/agent/prompt.py | head -1 || echo "unknown")
          if [ ! -f EVALUATION.md ]; then
            echo "::warning::EVALUATION.md not found — generate it before submission: make eval-md (current PROMPT_VERSION=$CURRENT)"
            exit 0
          fi
          COMMITTED=$(grep -oP '`PROMPT_VERSION`[^`]*`\K[^`]+' EVALUATION.md | head -1 || echo "unknown")
          echo "code PROMPT_VERSION=$CURRENT · EVALUATION.md PROMPT_VERSION=$COMMITTED"
          if [ "$CURRENT" != "$COMMITTED" ]; then
            echo "::warning::EVALUATION.md was generated under PROMPT_VERSION $COMMITTED but the code is at $CURRENT. Regenerate before submission: make eval-md"
          fi
