# ─────────────────────────────────────────────────────────────────────────────
# Eval — real-LLM evaluation against ground_truth.json (Fork 44 + Fork 46).
#
# Costs LLM credits, so it runs sparingly:
#   - PRs that touch agent behavior (paths below) — opened / synchronize / reopened
#   - PRs (re)labeled `eval-on-pr` — explicit opt-in re-run (the `if` gate)
#   - nightly cron 05:00 UTC — catches provider-side model drift on main
#   - manual workflow_dispatch
#
# A content-hash cache keyed on the eval-relevant files skips the LLM spend
# when nothing affecting the result changed. The suite itself SKIPS (never
# fails) unless real ANTHROPIC_API_KEY + OPENAI_API_KEY are present, so a
# fork without secrets won't error. See context/08-cicd-and-testing.md.
# ─────────────────────────────────────────────────────────────────────────────

name: Eval

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "backend/prompts/**"
      - "backend/src/customs_agent/agent/**"
      - "backend/src/customs_agent/tools/**"
      - "backend/src/customs_agent/rag/**"
      - "backend/src/customs_agent/data/**"
      - "backend/scripts/build_index.py"
      - "backend/tests/ground_truth.py"
      - "backend/tests/ground_truth.json"
      - "backend/tests/eval/**"
      - "backend/pyproject.toml"
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  eval:
    # A bare (re)label with some OTHER label shouldn't burn credits; only the
    # `eval-on-pr` label opts in. Path-triggered PR events (opened/synchronize/
    # reopened), nightly, and manual runs always proceed.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.action != 'labeled' ||
      github.event.label.name == 'eval-on-pr'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --locked

      # Hash everything that can change the eval OUTPUT (agent code, prompts,
      # RAG, data, the grader, the answer key, deps) so an unchanged branch
      # reuses the prior result instead of re-spending LLM credits. Generated
      # files (.last-result.json / REPORT.md) are excluded by restricting the
      # tests/eval scan to *.py.
      - name: Compute content hash for cache key
        id: hash
        run: |
          HASH=$( ( \
            find prompts src/customs_agent/agent src/customs_agent/tools \
                       src/customs_agent/rag src/customs_agent/data \
                 -type f \( -name '*.py' -o -name '*.md' \) | sort | xargs sha256sum; \
            find tests/eval -type f -name '*.py' | sort | xargs sha256sum; \
            sha256sum tests/ground_truth.py tests/ground_truth.json pyproject.toml uv.lock \
          ) | sha256sum | cut -d' ' -f1 )
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Restore eval cache
        id: cache
        uses: actions/cache@v4
        with:
          key: eval-result-${{ steps.hash.outputs.hash }}
          path: backend/tests/eval/.last-result.json

      # Gate the costly steps on secrets actually being present. Forks / repos
      # without secrets get empty strings, which would crash build_index.py and
      # 401 the agent — so without this the "skips cleanly without keys" promise
      # (which otherwise only holds at the pytest layer) breaks at build time.
      - name: Check eval secrets are present
        id: secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ] && [ -n "$OPENAI_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Eval secrets not configured — skipping the real-LLM eval (expected on forks / unconfigured repos)."
          fi

      - name: Build RAG index
        if: steps.cache.outputs.cache-hit != 'true' && steps.secrets.outputs.present == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run python scripts/build_index.py \
            --out-chroma ./chroma_db \
            --out-bm25 ./bm25.pkl \
            --out-manifest ./manifest.json

      - name: Run real-LLM eval
        if: steps.cache.outputs.cache-hit != 'true' && steps.secrets.outputs.present == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: https://us.cloud.langfuse.com
        run: uv run pytest tests/eval -v --junitxml=tests/eval/.junit.xml

      # Sticky comment: find the prior eval comment by a hidden marker and
      # update it in place, else create one. Keeps exactly one living eval
      # comment per PR instead of accumulating a new one per run. On a cache
      # hit there's no REPORT.md and we skip — the existing comment already
      # reflects this identical content (same content-hash cache key).
      - name: Comment eval results on PR (sticky)
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'backend/tests/eval/REPORT.md';
            if (!fs.existsSync(path)) {
              core.info('No REPORT.md (cache hit or eval skipped) — the existing sticky comment already reflects this content.');
              return;
            }
            const MARKER = '<!-- customs-eval-report -->';
            const body = MARKER + '\n' + fs.readFileSync(path, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload eval artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: backend/tests/eval/
          if-no-files-found: ignore

      - name: Open issue on nightly failure
        if: ${{ failure() && github.event_name == 'schedule' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly eval failed ${new Date().toISOString().split('T')[0]}`,
              labels: ['eval-failure', 'drift'],
              body: 'Nightly eval regression on main. See the workflow run for details. '
                + 'Since main did not change, this likely indicates provider-side model '
                + 'drift (a Sonnet 4-6 snapshot rotation) rather than a repo regression.',
            });
