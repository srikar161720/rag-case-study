# ─────────────────────────────────────────────────────────────────────────────
# Deploy — build + push the backend image to Fly on every push to main
# (post-merge), then smoke-test /ready. Frontend deploys are handled entirely
# by Vercel's GitHub integration (auto-preview on PR, auto-promote on merge), so
# there's no frontend step here.
#
# Rollback is MANUAL (G17): if the smoke test fails the workflow goes red and a
# human rolls back via `flyctl releases rollback` — no auto-rollback machinery.
#
# Required GitHub Actions secrets:
#   FLY_API_TOKEN   — `flyctl auth token`
#   OPENAI_API_KEY  — passed as a BuildKit secret so build_index.py can embed the
#                     knowledge chunks during the image build (never lands in a layer)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]

# Never let two deploys to main overlap; let an in-flight one finish.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin to a release tag (not @master) so third-party action code can't
      # change under us without review.
      - uses: superfly/flyctl-actions/setup-flyctl@v1.5
      - name: Deploy to Fly
        run: |
          flyctl deploy --config backend/fly.toml \
            --build-secret openai_key="$OPENAI_API_KEY" \
            --remote-only \
            --app customs-agent-backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Wait for new machine
        run: sleep 15

      - name: Smoke test /ready
        run: |
          # Poll /ready with retries. Do NOT use `curl -f` here: -f exits
          # non-zero on a non-2xx, which (under set -e) would abort before we
          # capture the status — defeating the explicit check and making a
          # transient 503 mid-rollout look like a hard failure. Capture the HTTP
          # code instead and retry a few times before giving up.
          url="https://customs-agent-backend.fly.dev/ready"
          attempts=5
          status=000
          body=""
          for i in $(seq 1 "$attempts"); do
            body=$(curl -s -m 10 -w $'\n%{http_code}' "$url" || true)
            status=$(printf '%s' "$body" | tail -n 1)
            body=$(printf '%s' "$body" | sed '$d')
            if [ "$status" = "200" ]; then
              echo "✓ /ready passed (attempt $i)"
              printf '%s' "$body" | jq .
              exit 0
            fi
            echo "attempt $i/$attempts: /ready returned $status — retrying in 10s"
            sleep 10
          done
          echo "::error::/ready did not return 200 after $attempts attempts (last status: $status)"
          printf '%s\n' "$body"
          exit 1
